<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Chess 2 - Browser Portal</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Important for the toast animation */
        }

        .container {
            text-align: center;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 320px;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 2.2em;
            color: #eee;
        }

        .copy-button {
            display: inline-block;
            padding: 18px 40px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

            .copy-button:hover {
                background: #218838;
                transform: translateY(-2px);
            }

            .copy-button:active {
                transform: translateY(0) scale(0.98);
            }

        .info {
            margin-top: 25px;
            font-size: 0.9em;
            color: #bbb;
            line-height: 1.5;
        }

        /* --- Toast Notification Style --- */
        .copied-toast {
            position: fixed;
            bottom: -50px; /* Start hidden below the screen */
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 200;
            /* The floating and dissipating logic */
            transition: bottom 0.5s ease-out, opacity 0.5s ease-out;
            opacity: 0;
            pointer-events: none; /* Can click through it */
        }

        .show-toast {
            bottom: 30px; /* Animate into view */
            opacity: 1; /* Dissipate: change this with keyframes for true 'floating away' */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Infinite Chess 2</h1>

        <button class="copy-button" id="copyBtn">
            Get Browser URL
        </button>

        <p class="info">
            This bypasses Discord's script blocks. <br>
            Paste the link into Chrome or Firefox to fix the "Firebase not defined" error.
        </p>
    </div>

    <div class="copied-toast" id="toast">Link Copied!</div>

    <script>
        // Use the relative path to your game file
        const gameUrl = location.origin + "/chess.html";
        const btn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        btn.onclick = function () {
            // Bypass sandbox restrictions: Copy data directly
            navigator.clipboard.writeText(gameUrl).then(() => {
                // Trigger the 'float and dissipate' animation
                toast.classList.add('show-toast');
                btn.style.background = "#155724"; // Feedback on the button
                btn.innerText = "Link is Ready!";

                // Hide it again after 3 seconds
                setTimeout(() => {
                    toast.classList.remove('show-toast');
                    btn.innerText = "Get Browser URL";
                    btn.style.background = "#28a745";
                }, 3000);
            });
        };
    </script>
</body>
</html>
