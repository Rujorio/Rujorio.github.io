<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Chess 2 - Browser Portal</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            max-width: 350px;
            width: 90%;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.8em;
            color: #eee;
        }

        /* The QR Code Image */
        .qr-frame {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin: 20px 0;
        }

            .qr-frame img {
                display: block;
                width: 180px;
                height: 180px;
            }

        .url-input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 2px solid #444;
            border-radius: 8px;
            color: #00ff00;
            font-family: monospace;
            font-size: 0.9em;
            text-align: center;
            margin-top: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .info {
            font-size: 0.8em;
            color: #888;
            margin-top: 15px;
            line-height: 1.4;
        }

        .highlight {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Infinite Chess 2</h1>
        <p class="info">Scan to play on mobile or bypass Discord blocks.</p>

        <div class="qr-frame">
            <img src="https://quickchart.io/qr?text=https://rujorio.github.io/chess.html&size=180" alt="Game QR Code">
        </div>

        <p style="font-size: 0.9em; margin-top: 10px;">Or manually copy/paste:</p>
        <input type="text" class="url-input" id="gameUrl"
               value="https://rujorio.github.io/chess.html" readonly>

        <p class="info">
            Pasting this into <b>Chrome</b> fixes the <span class="highlight">"Firebase is not defined"</span> error.
        </p>
    </div>

    <script>
        // Simple selection fall-back
        document.getElementById('gameUrl').onclick = function () {
            this.select();
        };
    </script>
</body>
</html>
