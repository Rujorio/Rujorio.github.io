<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: https://*.discord.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; connect-src 'self' https: wss:; img-src * data:; style-src 'self' 'unsafe-inline';">

    <title>Infinite Chess 2</title>

    <script src="/gstatic/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="/gstatic/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 9px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 180px;
        }

        #status {
            font-size: 0.85em;
            color: #ffcc00;
            margin-bottom: 5px;
            font-weight: bold;
        }

        #turn {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .controls {
            font-size: 0.75em;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        #lobby-list {
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .lobby-item {
            display: block;
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            text-align: left;
        }

            .lobby-item:hover {
                background: #218838;
            }

        #debug-btn {
            margin-top: 10px;
            padding: 5px;
            font-size: 10px;
            background: #444;
            color: #ccc;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom</div>
        <div id="status">Status: Initializing...</div>
        <div id="lobby-list">
            <div id="rooms-container">Searching...</div>
        </div>
        <button id="debug-btn" onclick="startFirebase()">Force Reconnect</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // Use a more robust check for the proxy
        function startFirebase() {
            const statusDisplay = document.getElementById('status');

            if (typeof firebase === 'undefined') {
                statusDisplay.innerText = "Status: Firebase Load Failed";
                statusDisplay.style.color = "#ff4444";
                console.error("Firebase is not defined. Check Discord URL Mappings for /gstatic");
                return;
            }

            try {
                const firebaseConfig = {
                    apiKey: "AIzaSyCkwChcME83CiH_D7RbO9kYD0sBPYcCl6Y",
                    authDomain: "chess-2-2a1c9.firebaseapp.com",
                    databaseURL: location.origin + "/firebase",
                    projectId: "chess-2-2a1c9",
                    storageBucket: "chess-2-2a1c9.appspot.com",
                    messagingSenderId: "1048494437159",
                    appId: "1:1048494437159:web:f471c57a71d361c3982f02"
                };

                // Prevent multiple initializations
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }

                const db = firebase.database();
                statusDisplay.innerText = "Status: Proxy Connected";
                statusDisplay.style.color = "#00ff00";

                initGameLogic(db);
            } catch (e) {
                statusDisplay.innerText = "Status: Config Error";
                console.error(e);
            }
        }

        function initGameLogic(db) {
            let myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
            let currentRoomId = myRoomId;
            let roomRef = null;

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const turnDisplay = document.getElementById('turn');
            const roomsContainer = document.getElementById('rooms-container');

            let width, height, cellSize = 60;
            let camera = { x: 0, y: 0, zoom: 1 };
            let isDragging = false, lastMouse = { x: 0, y: 0 };
            let selectedPiece = null, turn = 'white', board = [];

            const PIECES = {
                white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
                black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
            };

            window.initAsHost = function (id) {
                if (roomRef) roomRef.off();
                currentRoomId = id;
                roomRef = db.ref('rooms/' + id);
                initBoard();
                roomRef.set({ board, turn, hostName: "Player " + id });
                roomRef.onDisconnect().remove();
                roomRef.on('value', (snap) => {
                    const data = snap.val();
                    if (data) { board = data.board || []; turn = data.turn || 'white'; updateTurnDisplay(); }
                });
            };

            window.joinOtherRoom = function (targetId) {
                db.ref('rooms/' + currentRoomId).remove().then(() => {
                    if (roomRef) roomRef.off();
                    currentRoomId = targetId;
                    roomRef = db.ref('rooms/' + targetId);
                    roomRef.on('value', (snap) => {
                        const data = snap.val();
                        if (data) { board = data.board || []; turn = data.turn || 'white'; updateTurnDisplay(); }
                    });
                });
            };

            db.ref('rooms').on('value', (snap) => {
                roomsContainer.innerHTML = "";
                const allRooms = snap.val();
                let count = 0;
                if (allRooms) {
                    Object.keys(allRooms).forEach(key => {
                        if (key !== currentRoomId) {
                            count++;
                            const btn = document.createElement('button');
                            btn.className = 'lobby-item';
                            btn.innerText = "Join " + (allRooms[key].hostName || key);
                            btn.onclick = () => joinOtherRoom(key);
                            roomsContainer.appendChild(btn);
                        }
                    });
                }
                if (count === 0) roomsContainer.innerHTML = "Searching...";
            });

            function initBoard() {
                board = [];
                const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
                for (let i = 0; i < 8; i++) {
                    board.push({ x: i, y: 7, type: layout[i], color: 'white' }, { x: i, y: 6, type: 'p', color: 'white' });
                    board.push({ x: i, y: 0, type: layout[i], color: 'black' }, { x: i, y: 1, type: 'p', color: 'black' });
                }
            }

            function updateTurnDisplay() {
                turnDisplay.innerText = `Turn: ${turn.charAt(0).toUpperCase() + turn.slice(1)}`;
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                const vStep = cellSize * camera.zoom;
                for (let x = Math.floor((-width / 2 - camera.x) / vStep); x <= Math.ceil((width / 2 - camera.x) / vStep); x++) {
                    for (let y = Math.floor((-height / 2 - camera.y) / vStep); y <= Math.ceil((height / 2 - camera.y) / vStep); y++) {
                        ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                        ctx.fillRect(width / 2 + camera.x + x * vStep, height / 2 + camera.y + y * vStep, vStep, vStep);
                    }
                }
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${vStep * 0.8}px serif`;
                board.forEach(p => {
                    ctx.fillStyle = 'black';
                    ctx.fillText(PIECES[p.color][p.type], width / 2 + camera.x + (p.x + 0.5) * vStep, height / 2 + camera.y + (p.y + 0.5) * vStep);
                });
                requestAnimationFrame(draw);
            }

            function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            initAsHost(myRoomId);
            draw();
        }

        // Start on load
        window.onload = startFirebase;
    </script>
</body>
</html>
