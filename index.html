<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Chess 2 - Browser Portal</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 25px;
            font-size: 2.2em;
            color: #eee;
        }

        .copy-button {
            display: inline-block;
            padding: 18px 40px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

            .copy-button:hover {
                background: #218838;
                transform: scale(1.05);
            }

            .copy-button:active {
                transform: scale(0.98);
            }

        .info {
            margin-top: 25px;
            font-size: 0.9em;
            color: #888;
            max-width: 320px;
            line-height: 1.5;
        }

        #feedback {
            margin-top: 15px;
            font-size: 0.85em;
            color: #00ff00;
            font-weight: bold;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Infinite Chess 2</h1>

        <button class="copy-button" id="copyBtn">
            Copy Game URL to Play
        </button>

        <div id="feedback">URL Copied! Paste into Browser</div>

        <p class="info">
            Discord blocks internal loading. <br>
            <b>Copy the link</b> and paste it into Chrome or Firefox to fix the "Firebase not defined" error.
        </p>
    </div>

    <script>
        const gameUrl = "https://rujorio.github.io/chess.html";
        const btn = document.getElementById('copyBtn');
        const feedback = document.getElementById('feedback');

        btn.onclick = function () {
            navigator.clipboard.writeText(gameUrl).then(() => {
                feedback.style.opacity = "1";
                btn.innerText = "Link Copied!";
                btn.style.background = "#155724";

                setTimeout(() => {
                    feedback.style.opacity = "0";
                    btn.innerText = "Copy Game URL to Play";
                    btn.style.background = "#28a745";
                }, 3000);
            });
        };
    </script>
</body>
</html>
