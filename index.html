<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Chess 2 - Browser Portal</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.2em;
            color: #eee;
        }

        .url-box {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            color: #00ff00;
            font-family: monospace;
            word-break: break-all;
            margin: 20px 0;
            font-size: 0.9em;
            cursor: pointer;
        }

        .info {
            font-size: 0.95em;
            color: #bbb;
            line-height: 1.5;
        }

        .highlight {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Infinite Chess 2</h1>

        <p class="info">Discord is blocking the game from loading scripts.</p>

        <p class="info">To play, <span class="highlight">copy the URL below</span> and paste it into Chrome or Firefox:</p>

        <div class="url-box" id="urlDisplay">
            https://rujorio.github.io/chess.html
        </div>

        <p class="info" style="font-size: 0.8em; color: #666;">
            Opening this directly in a browser fixes the "Firebase is not defined" error.
        </p>
    </div>

    <script>
        // Clicking the box copies the URL automatically
        document.getElementById('urlDisplay').onclick = function () {
            navigator.clipboard.writeText(this.innerText);
            alert("URL copied! Now paste it into your browser address bar.");
        }
    </script>
</body>
</html>
