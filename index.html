<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Chess 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
            color: white;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            border: 1px solid #444;
            min-width: 160px;
        }

        #status {
            color: #ffcc00;
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .info {
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">Status: Checking Firebase...</div>
        <div class="info">Turn: <span id="turn-display">White</span></div>
        <button onclick="location.reload()" style="margin-top:10px; cursor:pointer;">Hard Reload</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/gstatic/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="/gstatic/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        function initApp() {
            const statusLabel = document.getElementById('status');

            if (typeof firebase === 'undefined') {
                statusLabel.innerText = "Status: Script Blocked (Check Mappings)";
                statusLabel.style.color = "#ff4444";
                return;
            }

            const firebaseConfig = {
                apiKey: "AIzaSyCkwChcME83CiH_D7RbO9kYD0sBPYcCl6Y",
                authDomain: "chess-2-2a1c9.firebaseapp.com",
                // This MUST match your /firebase proxy prefix
                databaseURL: window.location.origin + "/firebase",
                projectId: "chess-2-2a1c9"
            };

            try {
                firebase.initializeApp(firebaseConfig);
                const db = firebase.database();

                // Test connection
                db.ref('.info/connected').on('value', (snap) => {
                    if (snap.val() === true) {
                        statusLabel.innerText = "Status: Online";
                        statusLabel.style.color = "#00ff00";
                    } else {
                        statusLabel.innerText = "Status: Connecting...";
                    }
                });

                runGame(db);
            } catch (err) {
                statusLabel.innerText = "Status: Config Error";
                console.error(err);
            }
        }

        function runGame(db) {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let board = [];

            // Quick draw loop to verify the canvas is working
            function animate() {
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw a simple test grid
                ctx.strokeStyle = "#333";
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            animate();
        }

        window.onload = initApp;
    </script>
</body>
</html>
