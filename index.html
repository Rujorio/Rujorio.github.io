<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src https: wss:;">
    <title>Infinite Chess</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            border-radius: 9px;
            pointer-events: auto;
            z-index: 100;
        }

        .controls {
            font-size: 0.8em;
            opacity: 0.7;
            margin: 5px 0;
        }

        #peer-area {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }

        input {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 5px;
            border-radius: 4px;
            width: 120px;
        }

        button {
            background: #28a745;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

            button:hover {
                background: #218838;
            }

        #status {
            font-size: 0.85em;
            color: #00ff00;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom</div>

        <div id="peer-area">
            <div id="status">Status: Connecting...</div>
            <div id="my-id" style="font-size: 0.8em; margin-bottom: 8px;">Your ID: ...</div>
            <input type="text" id="remote-id" placeholder="Friend's ID">
            <button onclick="connectToFriend()">Connect</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turn');
        const statusDisplay = document.getElementById('status');
        const myIdDisplay = document.getElementById('my-id');

        let width, height;
        let cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let selectedPiece = null;
        let turn = 'white';
        let board = [];

        // --- MULTIPLAYER LOGIC ---
        const peer = new Peer();
        let conn = null;

        peer.on('open', (id) => {
            myIdDisplay.innerText = "Your ID: " + id;
            statusDisplay.innerText = "Status: Ready";
        });

        // Receiving a connection
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
            statusDisplay.innerText = "Status: Connected!";
        });

        function connectToFriend() {
            const id = document.getElementById('remote-id').value;
            if (!id) return;
            statusDisplay.innerText = "Status: Connecting...";
            conn = peer.connect(id);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                statusDisplay.innerText = "Status: Connected!";
                // Send current board state to friend when connecting
                conn.send({ type: 'sync', board: board, turn: turn });
            });

            conn.on('data', (data) => {
                if (data.type === 'move') {
                    applyMove(data.from, data.to);
                } else if (data.type === 'sync') {
                    board = data.board;
                    turn = data.turn;
                    updateTurnDisplay();
                }
            });
        }

        // --- GAME LOGIC ---
        const PIECES = {
            white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        function initBoard() {
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board.push({ x: i, y: 7, type: layout[i], color: 'white' });
                board.push({ x: i, y: 6, type: 'p', color: 'white' });
                board.push({ x: i, y: 0, type: layout[i], color: 'black' });
                board.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const viewStep = cellSize * camera.zoom;
            const startX = Math.floor((-width / 2 - camera.x) / viewStep);
            const endX = Math.ceil((width / 2 - camera.x) / viewStep);
            const startY = Math.floor((-height / 2 - camera.y) / viewStep);
            const endY = Math.ceil((height / 2 - camera.y) / viewStep);

            for (let x = startX; x <= endX; x++) {
                for (let y = startY; y <= endY; y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                    ctx.fillRect(width / 2 + camera.x + x * viewStep, height / 2 + camera.y + y * viewStep, viewStep, viewStep);
                }
            }

            if (selectedPiece) {
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 3;
                ctx.strokeRect(width / 2 + camera.x + selectedPiece.x * viewStep, height / 2 + camera.y + selectedPiece.y * viewStep, viewStep, viewStep);
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `${viewStep * 0.8}px serif`;
            board.forEach(p => {
                ctx.fillStyle = 'black';
                ctx.fillText(PIECES[p.color][p.type], width / 2 + camera.x + (p.x + 0.5) * viewStep, height / 2 + camera.y + (p.y + 0.5) * viewStep);
            });
            requestAnimationFrame(draw);
        }

        function handleCellClick(worldPos) {
            const x = worldPos.x; const y = worldPos.y;
            const pieceAtPos = board.find(p => p.x === x && p.y === y);

            if (selectedPiece) {
                const from = { x: selectedPiece.x, y: selectedPiece.y };
                const to = { x, y };

                // Capture or Move
                if (!pieceAtPos || pieceAtPos.color !== selectedPiece.color) {
                    applyMove(from, to);
                    // SEND MOVE TO FRIEND
                    if (conn && conn.open) {
                        conn.send({ type: 'move', from, to });
                    }
                } else {
                    selectedPiece = pieceAtPos.color === turn ? pieceAtPos : null;
                }
            } else if (pieceAtPos && pieceAtPos.color === turn) {
                selectedPiece = pieceAtPos;
            }
        }

        function applyMove(from, to) {
            const piece = board.find(p => p.x === from.x && p.y === from.y);
            if (!piece) return;

            // Remove target piece if it's a capture
            board = board.filter(p => !(p.x === to.x && p.y === to.y));

            piece.x = to.x;
            piece.y = to.y;
            selectedPiece = null;
            turn = turn === 'white' ? 'black' : 'white';
            updateTurnDisplay();
        }

        function updateTurnDisplay() {
            turnDisplay.innerText = `Turn: ${turn.charAt(0).toUpperCase() + turn.slice(1)}`;
        }

        // Event Listeners
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', (e) => { isDragging = false; lastMouse = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                isDragging = true;
                camera.x += e.clientX - lastMouse.x;
                camera.y += e.clientY - lastMouse.y;
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });
        canvas.addEventListener('mouseup', (e) => {
            if (!isDragging) {
                const rect = canvas.getBoundingClientRect();
                const worldPos = screenToWorld({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                handleCellClick(worldPos);
            }
        });
        canvas.addEventListener('wheel', (e) => {
            camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
            camera.zoom = Math.max(0.1, Math.min(camera.zoom, 5));
        });

        function screenToWorld(pos) {
            return {
                x: Math.floor((pos.x - width / 2 - camera.x) / (cellSize * camera.zoom)),
                y: Math.floor((pos.y - height / 2 - camera.y) / (cellSize * camera.zoom))
            };
        }

        window.addEventListener('load', () => {
            resize();
            initBoard();
            draw();
        });
    </script>
</body>
</html>
