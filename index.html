<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://*.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com;">
    <title>Infinite Chess 2</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 9px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        #status {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .controls {
            font-size: 0.75em;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        input {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 6px;
            border-radius: 4px;
            width: 110px;
        }

        button {
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            background: #28a745;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom</div>
        <div id="status">Status: Enter Room Name</div>
        <input type="text" id="room-id" placeholder="e.g. chess123">
        <button onclick="joinRoom()">Join Game</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // CONFIG FROM YOUR SCREENSHOT
        // Updated with your actual URL from image_4f7afe.png
        const firebaseConfig = {
            apiKey: "AIzaSyCkwChcME83CiH_D7RbO9kYD0sBPYcCl6Y",
            authDomain: "chess-2-2a1c9.firebaseapp.com",
            // THIS LINE WAS THE PROBLEM:
            databaseURL: "https://chess-2-2a1c9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chess-2-2a1c9",
            storageBucket: "chess-2-2a1c9.appspot.com",
            messagingSenderId: "1048494437159",
            appId: "1:1048494437159:web:f471c57a71d361c3982f02"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let roomRef = null;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');
        const turnDisplay = document.getElementById('turn');

        let width, height, cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false, lastMouse = { x: 0, y: 0 };
        let selectedPiece = null, turn = 'white', board = [];

        const PIECES = {
            white: { r: 'έβΨ', n: 'έβα', b: 'έβΩ', q: 'έβΧ', k: 'έβΦ', p: 'έββ' },
            black: { r: 'έβε', n: 'έβη', b: 'έβζ', q: 'έβδ', k: 'έβγ', p: 'έβθ' }
        };

        function joinRoom() {
            const roomId = document.getElementById('room-id').value.trim().toLowerCase();
            if (!roomId) return;

            if (roomRef) roomRef.off();
            roomRef = db.ref('rooms/' + roomId);
            statusDisplay.innerText = "Status: Connecting...";

            roomRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    board = data.board || [];
                    turn = data.turn || 'white';
                    updateTurnDisplay();
                    statusDisplay.innerText = "Status: In Room " + roomId;
                    statusDisplay.style.color = "#00ff00";
                } else {
                    initBoard();
                    syncToFirebase();
                }
            });
        }

        function syncToFirebase() {
            if (roomRef) roomRef.set({ board, turn });
        }

        function initBoard() {
            board = [];
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board.push({ x: i, y: 7, type: layout[i], color: 'white' });
                board.push({ x: i, y: 6, type: 'p', color: 'white' });
                board.push({ x: i, y: 0, type: layout[i], color: 'black' });
                board.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
        }

        function applyMove(from, to) {
            const piece = board.find(p => p.x === from.x && p.y === from.y);
            if (!piece) return;
            board = board.filter(p => !(p.x === to.x && p.y === to.y));
            piece.x = to.x; piece.y = to.y;
            selectedPiece = null;
            turn = (turn === 'white') ? 'black' : 'white';
            updateTurnDisplay();
            syncToFirebase();
        }

        function updateTurnDisplay() {
            turnDisplay.innerText = `Turn: ${turn.charAt(0).toUpperCase() + turn.slice(1)}`;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const vStep = cellSize * camera.zoom;
            const sX = Math.floor((-width / 2 - camera.x) / vStep);
            const eX = Math.ceil((width / 2 - camera.x) / vStep);
            const sY = Math.floor((-height / 2 - camera.y) / vStep);
            const eY = Math.ceil((height / 2 - camera.y) / vStep);

            for (let x = sX; x <= eX; x++) {
                for (let y = sY; y <= eY; y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                    ctx.fillRect(width / 2 + camera.x + x * vStep, height / 2 + camera.y + y * vStep, vStep, vStep);
                }
            }
            if (selectedPiece) {
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
                ctx.strokeRect(width / 2 + camera.x + selectedPiece.x * vStep, height / 2 + camera.y + selectedPiece.y * vStep, vStep, vStep);
            }
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${vStep * 0.8}px serif`;
            board.forEach(p => {
                ctx.fillStyle = 'black';
                ctx.fillText(PIECES[p.color][p.type], width / 2 + camera.x + (p.x + 0.5) * vStep, height / 2 + camera.y + (p.y + 0.5) * vStep);
            });
            requestAnimationFrame(draw);
        }

        function screenToWorld(pos) {
            return {
                x: Math.floor((pos.x - width / 2 - camera.x) / (cellSize * camera.zoom)),
                y: Math.floor((pos.y - height / 2 - camera.y) / (cellSize * camera.zoom))
            };
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', (e) => { isDragging = false; lastMouse = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                isDragging = true;
                camera.x += e.clientX - lastMouse.x;
                camera.y += e.clientY - lastMouse.y;
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });
        canvas.addEventListener('mouseup', (e) => {
            if (!isDragging) {
                const rect = canvas.getBoundingClientRect();
                const worldPos = screenToWorld({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                const pieceAtPos = board.find(p => p.x === worldPos.x && p.y === worldPos.y);

                if (selectedPiece) {
                    if (!pieceAtPos || pieceAtPos.color !== selectedPiece.color) {
                        applyMove({ x: selectedPiece.x, y: selectedPiece.y }, worldPos);
                    } else {
                        selectedPiece = (pieceAtPos.color === turn) ? pieceAtPos : null;
                    }
                } else if (pieceAtPos && pieceAtPos.color === turn) {
                    selectedPiece = pieceAtPos;
                }
            }
        });
        canvas.addEventListener('wheel', (e) => {
            camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
            camera.zoom = Math.max(0.1, Math.min(camera.zoom, 5));
        });

        resize();
        draw();
    </script>
</body>
</html>
