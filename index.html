<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src * wss:;">
    <title>Infinite Chess</title>

    <script src="peerjs.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 9px;
            pointer-events: auto;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .controls {
            font-size: 0.75em;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        #peer-area {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }

        input {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 6px;
            border-radius: 4px;
            width: 110px;
            font-size: 0.8em;
        }

        button {
            background: #28a745;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin: 2px;
        }

            button.copy {
                background: #555;
                margin-left: 5px;
            }

        #status {
            font-size: 0.85em;
            color: #00ff00;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom</div>
        <div id="peer-area">
            <div id="status">Status: Initializing...</div>
            <div style="display: flex; align-items: center; margin-bottom: 8px;">
                <span id="my-id" style="font-size: 0.8em; color: #aaa;">ID: ...</span>
                <button class="copy" onclick="copyMyId()">Copy</button>
            </div>
            <input type="text" id="remote-id" placeholder="Friend's ID">
            <button onclick="connectToFriend()">Connect</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turn');
        const statusDisplay = document.getElementById('status');
        const myIdDisplay = document.getElementById('my-id');

        let width, height;
        let cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let selectedPiece = null;
        let turn = 'white';
        let board = [];
        let currentPeerId = "";

        // --- 3. IMMEDIATE BOOT (Before PeerJS) ---
        function initBoard() {
            board = [];
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board.push({ x: i, y: 7, type: layout[i], color: 'white' });
                board.push({ x: i, y: 6, type: 'p', color: 'white' });
                board.push({ x: i, y: 0, type: layout[i], color: 'black' });
                board.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function draw() {
            if (!width) resize();
            ctx.clearRect(0, 0, width, height);
            const vStep = cellSize * camera.zoom;
            const sX = Math.floor((-width / 2 - camera.x) / vStep);
            const eX = Math.ceil((width / 2 - camera.x) / vStep);
            const sY = Math.floor((-height / 2 - camera.y) / vStep);
            const eY = Math.ceil((height / 2 - camera.y) / vStep);

            for (let x = sX; x <= eX; x++) {
                for (let y = sY; y <= eY; y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                    ctx.fillRect(width / 2 + camera.x + x * vStep, height / 2 + camera.y + y * vStep, vStep, vStep);
                }
            }
            if (selectedPiece) {
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
                ctx.strokeRect(width / 2 + camera.x + selectedPiece.x * vStep, height / 2 + camera.y + selectedPiece.y * vStep, vStep, vStep);
            }
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${vStep * 0.8}px serif`;
            board.forEach(p => {
                ctx.fillStyle = 'black';
                ctx.fillText(PIECES[p.color][p.type], width / 2 + camera.x + (p.x + 0.5) * vStep, height / 2 + camera.y + (p.y + 0.5) * vStep);
            });
            requestAnimationFrame(draw);
        }

        // --- 4. PEERJS LOGIC (Async) ---
        const PIECES = {
            white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            pingInterval: 3000, // Keeps the connection alive in the sandbox
            debug: 2
        });
        let conn = null;

        peer.on('open', (id) => {
            currentPeerId = id;
            myIdDisplay.innerText = "ID: " + id;
            statusDisplay.innerText = "Status: Online";
        });

        peer.on('error', (err) => {
            statusDisplay.innerText = "Status: Net Error (" + err.type + ")";
            statusDisplay.style.color = "#ff4444";
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });

        function copyMyId() {
            if (!currentPeerId) return;
            navigator.clipboard.writeText(currentPeerId);
            const btn = document.querySelector('.copy');
            btn.innerText = "Saved!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        function connectToFriend() {
            const id = document.getElementById('remote-id').value.trim();
            if (!id) return;
            statusDisplay.innerText = "Status: Linking...";
            conn = peer.connect(id);
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                statusDisplay.innerText = "Status: Connected!";
                conn.send({ type: 'sync', board: board, turn: turn });
            });
            conn.on('data', (data) => {
                if (data.type === 'move') applyMove(data.from, data.to);
                if (data.type === 'sync') { board = data.board; turn = data.turn; updateTurnDisplay(); }
            });
        }

        function applyMove(from, to) {
            const piece = board.find(p => p.x === from.x && p.y === from.y);
            if (!piece) return;
            board = board.filter(p => !(p.x === to.x && p.y === to.y));
            piece.x = to.x; piece.y = to.y;
            selectedPiece = null;
            turn = (turn === 'white') ? 'black' : 'white';
            updateTurnDisplay();
        }

        function updateTurnDisplay() { turnDisplay.innerText = `Turn: ${turn.charAt(0).toUpperCase() + turn.slice(1)}`; }

        function screenToWorld(pos) {
            return {
                x: Math.floor((pos.x - width / 2 - camera.x) / (cellSize * camera.zoom)),
                y: Math.floor((pos.y - height / 2 - camera.y) / (cellSize * camera.zoom))
            };
        }

        // Input Handlers
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousedown', (e) => { isDragging = false; lastMouse = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                isDragging = true;
                camera.x += e.clientX - lastMouse.x;
                camera.y += e.clientY - lastMouse.y;
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });
        canvas.addEventListener('mouseup', (e) => {
            if (!isDragging) {
                const rect = canvas.getBoundingClientRect();
                const worldPos = screenToWorld({ x: e.clientX - rect.left, y: e.clientY - rect.top });
                const pieceAtPos = board.find(p => p.x === worldPos.x && p.y === worldPos.y);

                if (selectedPiece) {
                    const from = { x: selectedPiece.x, y: selectedPiece.y };
                    const to = worldPos;
                    if (!pieceAtPos || pieceAtPos.color !== selectedPiece.color) {
                        applyMove(from, to);
                        if (conn && conn.open) conn.send({ type: 'move', from, to });
                    } else { selectedPiece = (pieceAtPos.color === turn) ? pieceAtPos : null; }
                } else if (pieceAtPos && pieceAtPos.color === turn) { selectedPiece = pieceAtPos; }
            }
        });
        canvas.addEventListener('wheel', (e) => {
            camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
            camera.zoom = Math.max(0.1, Math.min(camera.zoom, 5));
        });

        // EXECUTE IMMEDIATELY
        initBoard();
        resize();
        draw();
    </script>
</body>
</html>
