<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Chess 2 - Browser Test</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            /* NEW: Prevents mobile "pull-to-refresh" and accidental zooming */
            touch-action: none !important;
            user-select: none;
            -webkit-user-select: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 9px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            min-width: 180px;
        }

        #status {
            font-size: 0.85em;
            color: #00ff00;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .controls {
            font-size: 0.75em;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        #lobby-list {
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .lobby-item {
            display: block;
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            text-align: left;
        }

            .lobby-item:hover {
                background: #218838;
            }

        .lobby-label {
            font-size: 0.7em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom</div>
        <div id="status">Status: Initializing...</div>

        <div id="lobby-list">
            <span class="lobby-label">Available Games:</span>
            <div id="rooms-container"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCkwCHcME83CIh_D7RbO9kYD0sBPYCcl6Y",
            authDomain: "chess-2-2a1c9.firebaseapp.com",
            projectId: "chess-2-2a1c9",
            storageBucket: "chess-2-2a1c9.firebasestorage.app",
            messagingSenderId: "1048494437159",
            appId: "1:1048494437159:web:f471c57a71d361c982ef02",
            measurementId: "G-XB4DL015VR",
            databaseURL: "https://chess-2-2a1c9-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. GLOBALS
        let myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
        let currentRoomId = myRoomId;
        let roomRef = null;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');
        const turnDisplay = document.getElementById('turn');
        const roomsContainer = document.getElementById('rooms-container');

        let width, height, cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false, lastMouse = { x: 0, y: 0 };
        let touchStartPos = { x: 0, y: 0 };
        let initialPinchDist = null;
        let lastZoom = 1;
        let selectedPiece = null, turn = 'white', board = [];

        const PIECES = {
            white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        // 3. LOGIC
        function initBoard() {
            board = [];
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board.push({ x: i, y: 7, type: layout[i], color: 'white' });
                board.push({ x: i, y: 6, type: 'p', color: 'white' });
                board.push({ x: i, y: 0, type: layout[i], color: 'black' });
                board.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
        }

        function syncToFirebase() {
            if (roomRef) roomRef.update({ board, turn });
        }

        function screenToWorld(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            return {
                x: Math.floor((x - width / 2 - camera.x) / (cellSize * camera.zoom)),
                y: Math.floor((y - height / 2 - camera.y) / (cellSize * camera.zoom))
            };
        }

        function handleGameClick(worldPos) {
            const pieceAtPos = board.find(p => p.x === worldPos.x && p.y === worldPos.y);
            if (selectedPiece) {
                if (!pieceAtPos || pieceAtPos.color !== selectedPiece.color) {
                    const piece = board.find(p => p.x === selectedPiece.x && p.y === selectedPiece.y);
                    if (piece) {
                        board = board.filter(p => !(p.x === worldPos.x && p.y === worldPos.y));
                        piece.x = worldPos.x; piece.y = worldPos.y;
                        selectedPiece = null;
                        turn = (turn === 'white') ? 'black' : 'white';
                        updateTurnDisplay();
                        syncToFirebase();
                    }
                } else {
                    selectedPiece = (pieceAtPos.color === turn) ? pieceAtPos : null;
                }
            } else if (pieceAtPos && pieceAtPos.color === turn) {
                selectedPiece = pieceAtPos;
            }
        }

        // 4. NETWORKING
        function initAsHost(id) {
            if (roomRef) roomRef.off();
            currentRoomId = id;
            roomRef = db.ref('rooms/' + id);
            roomRef.set({ board, turn: 'white', hostName: "Player " + id });
            roomRef.onDisconnect().remove();
            roomRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    board = data.board || [];
                    turn = data.turn || 'white';
                    updateTurnDisplay();
                    statusDisplay.innerText = "Status: Online (" + id + ")";
                }
            });
        }

        function joinOtherRoom(targetId) {
            db.ref('rooms/' + currentRoomId).remove().then(() => {
                if (roomRef) roomRef.off();
                currentRoomId = targetId;
                roomRef = db.ref('rooms/' + targetId);
                statusDisplay.innerText = "Status: Joined " + targetId;
                roomRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        board = data.board || [];
                        turn = data.turn || 'white';
                        updateTurnDisplay();
                    }
                });
            });
        }

        db.ref('rooms').on('value', (snapshot) => {
            roomsContainer.innerHTML = "";
            let count = 0;
            snapshot.forEach((child) => {
                if (child.key !== currentRoomId) {
                    count++;
                    const btn = document.createElement('button');
                    btn.className = 'lobby-item';
                    btn.innerText = "▶ Join " + (child.val().hostName || child.key);
                    btn.onclick = () => joinOtherRoom(child.key);
                    roomsContainer.appendChild(btn);
                }
            });
            if (count === 0) roomsContainer.innerHTML = "<span style='font-size:0.7em; color:#666;'>No other players online</span>";
        });

        function updateTurnDisplay() {
            turnDisplay.innerText = `Turn: ${turn.charAt(0).toUpperCase() + turn.slice(1)}`;
        }

        // 5. DRAW
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const vStep = cellSize * camera.zoom;
            for (let x = Math.floor((-width / 2 - camera.x) / vStep); x <= Math.ceil((width / 2 - camera.x) / vStep); x++) {
                for (let y = Math.floor((-height / 2 - camera.y) / vStep); y <= Math.ceil((height / 2 - camera.y) / vStep); y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                    ctx.fillRect(width / 2 + camera.x + x * vStep, height / 2 + camera.y + y * vStep, vStep, vStep);
                }
            }
            if (selectedPiece) {
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
                ctx.strokeRect(width / 2 + camera.x + selectedPiece.x * vStep, height / 2 + camera.y + selectedPiece.y * vStep, vStep, vStep);
            }
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${vStep * 0.8}px serif`;
            board.forEach(p => {
                ctx.fillStyle = 'black';
                ctx.fillText(PIECES[p.color][p.type], width / 2 + camera.x + (p.x + 0.5) * vStep, height / 2 + camera.y + (p.y + 0.5) * vStep);
            });
            requestAnimationFrame(draw);
        }

        // 6. INPUTS
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            isDragging = false;
            lastMouse = { x: e.clientX, y: e.clientY };
        });
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                isDragging = true;
                camera.x += e.clientX - lastMouse.x;
                camera.y += e.clientY - lastMouse.y;
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });
        canvas.addEventListener('mouseup', (e) => {
            if (!isDragging) handleGameClick(screenToWorld(e.clientX, e.clientY));
        });

        canvas.addEventListener('touchstart', (e) => {
            if (e.cancelable) e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = false;
                touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                initialPinchDist = null;
            } else if (e.touches.length === 2) {
                isDragging = true;
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                lastZoom = camera.zoom;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (e.cancelable) e.preventDefault();
            if (e.touches.length === 1 && !initialPinchDist) {
                camera.x += e.touches[0].clientX - lastMouse.x;
                camera.y += e.touches[0].clientY - lastMouse.y;
                if (Math.hypot(e.touches[0].clientX - touchStartPos.x, e.touches[0].clientY - touchStartPos.y) > 10) isDragging = true;
                lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2 && initialPinchDist) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                camera.zoom = Math.max(0.15, Math.min(lastZoom * (dist / initialPinchDist), 4));
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialPinchDist = null;
            if (e.touches.length === 0 && !isDragging) handleGameClick(screenToWorld(touchStartPos.x, touchStartPos.y));
        }, { passive: false });

        canvas.addEventListener('wheel', (e) => {
            camera.zoom = Math.max(0.1, Math.min(camera.zoom * (e.deltaY > 0 ? 0.9 : 1.1), 5));
        });

        // 7. START
        resize();
        initBoard();
        draw();
        initAsHost(myRoomId);
    </script>
</body>
</html>
