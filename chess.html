<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Chess - Debug Build</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: monospace;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #debug-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border: 1px solid #0f0;
            pointer-events: none;
            z-index: 100;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="debug-ui">
        <div id="d-status">Status: Connecting...</div>
        <div id="d-turn">Turn: -</div>
        <div id="d-pos">Last Click: -</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // 1. CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCkwCHcME83CIh_D7RbO9kYD0sBPYCcl6Y",
            authDomain: "chess-2-2a1c9.firebaseapp.com",
            projectId: "chess-2-2a1c9",
            databaseURL: "https://chess-2-2a1c9-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const roomRef = db.ref('rooms/stable-infinite-v1');

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let board = [], turn = 'white', myColor = 'white', selectedPiece = null;

        const PIECES = {
            white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        // 2. DATABASE SYNC
        roomRef.on('value', snap => {
            const data = snap.val();
            if (!data) {
                console.log("Initializing fresh board...");
                initNewGame();
                return;
            }
            board = data.board || [];
            turn = data.turn || 'white';
            document.getElementById('d-status').innerText = "Status: Online";
            document.getElementById('d-turn').innerText = "Turn: " + turn.toUpperCase();
        });

        function initNewGame() {
            const b = [];
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                b.push({ x: i, y: 7, type: layout[i], color: 'white' });
                b.push({ x: i, y: 6, type: 'p', color: 'white' });
                b.push({ x: i, y: 0, type: layout[i], color: 'black' });
                b.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
            roomRef.set({ board: b, turn: 'white' });
        }

        // 3. INPUT (Unified)
        function handleInput(sx, sy) {
            const vStep = cellSize * camera.zoom;
            const wx = Math.floor((sx - (width / 2 + camera.x)) / vStep);
            const wy = Math.floor((sy - (height / 2 + camera.y)) / vStep);

            document.getElementById('d-pos').innerText = `Last Click: ${wx}, ${wy}`;

            const piece = board.find(p => p.x === wx && p.y === wy);

            if (selectedPiece) {
                // MOVE (Sandbox style - moves anywhere for stability)
                if (piece && piece.color === myColor) {
                    selectedPiece = piece; // Change selection
                } else {
                    const newBoard = board.filter(p => !(p.x === wx && p.y === wy)); // Capture
                    const pIdx = newBoard.findIndex(p => p.x === selectedPiece.x && p.y === selectedPiece.y);
                    if (pIdx !== -1) {
                        newBoard[pIdx].x = wx;
                        newBoard[pIdx].y = wy;
                        roomRef.update({ board: newBoard, turn: turn === 'white' ? 'black' : 'white' });
                    }
                    selectedPiece = null;
                }
            } else if (piece && piece.color === myColor) {
                selectedPiece = piece;
            }
        }

        // 4. DRAWING
        function draw() {
            ctx.clearRect(0, 0, width, height);
            const vStep = cellSize * camera.zoom;
            const cx = width / 2 + camera.x, cy = height / 2 + camera.y;

            // Grid
            ctx.strokeStyle = '#222';
            ctx.beginPath();
            const startX = Math.floor(-cx / vStep), endX = Math.ceil((width - cx) / vStep);
            const startY = Math.floor(-cy / vStep), endY = Math.ceil((height - cy) / vStep);
            for (let x = startX; x <= endX; x++) { ctx.moveTo(cx + x * vStep, 0); ctx.lineTo(cx + x * vStep, height); }
            for (let y = startY; y <= endY; y++) { ctx.moveTo(0, cy + y * vStep); ctx.lineTo(width, cy + y * vStep); }
            ctx.stroke();

            // Pieces
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `${vStep * 0.8}px serif`;
            board.forEach(p => {
                ctx.fillStyle = p.color === 'white' ? 'white' : '#ff4444';
                ctx.fillText(PIECES[p.color][p.type], cx + (p.x + 0.5) * vStep, cy + (p.y + 0.5) * vStep);
            });

            if (selectedPiece) {
                ctx.strokeStyle = 'cyan'; ctx.lineWidth = 2;
                ctx.strokeRect(cx + selectedPiece.x * vStep, cy + selectedPiece.y * vStep, vStep, vStep);
            }

            requestAnimationFrame(draw);
        }

        // 5. EVENTS
        let isDragging = false, lastT = { x: 0, y: 0 };
        window.addEventListener('mousedown', e => { isDragging = false; lastT = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mousemove', e => {
            if (e.buttons === 1) {
                isDragging = true;
                camera.x += e.clientX - lastT.x; camera.y += e.clientY - lastT.y;
                lastT = { x: e.clientX, y: e.clientY };
            }
        });
        window.addEventListener('mouseup', e => { if (!isDragging) handleInput(e.clientX, e.clientY); });

        // Touch Support
        window.addEventListener('touchstart', e => { isDragging = false; lastT = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
        window.addEventListener('touchmove', e => {
            isDragging = true;
            camera.x += e.touches[0].clientX - lastT.x; camera.y += e.touches[0].clientY - lastT.y;
            lastT = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: false });
        window.addEventListener('touchend', e => { if (!isDragging) handleInput(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });

        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
        window.dispatchEvent(new Event('resize'));
        draw();
    </script>
</body>
</html>
