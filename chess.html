<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src https: wss:;">
    <title>Infinite Chess</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Puts the board behind the UI */
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 9px;
            pointer-events: auto;
            user-select: text; /* Allowed interaction for copying ID */
            z-index: 100;
        }

        .controls {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 5px;
        }

        #peer-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
            font-size: 0.9em;
            color: #00ff00;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom | Click to Move</div>
        <div id="peer-info">Connecting to network...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turn');
        const peerInfo = document.getElementById('peer-info');

        let width, height;
        let cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let selectedPiece = null;
        let turn = 'white';

        const PIECES = {
            white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        let board = [];

        // 3. INITIALIZE PEERJS
        const peer = new Peer();

        peer.on('open', (id) => {
            peerInfo.innerText = "Your ID: " + id;
            console.log("My peer ID is: " + id);
        });

        peer.on('error', (err) => {
            peerInfo.innerText = "Connection Error!";
            console.error(err);
        });

        function initBoard() {
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board.push({ x: i, y: 7, type: layout[i], color: 'white' });
                board.push({ x: i, y: 6, type: 'p', color: 'white' });
                board.push({ x: i, y: 0, type: layout[i], color: 'black' });
                board.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const viewStep = cellSize * camera.zoom;
            const startX = Math.floor((-width / 2 - camera.x) / viewStep);
            const endX = Math.ceil((width / 2 - camera.x) / viewStep);
            const startY = Math.floor((-height / 2 - camera.y) / viewStep);
            const endY = Math.ceil((height / 2 - camera.y) / viewStep);

            for (let x = startX; x <= endX; x++) {
                for (let y = startY; y <= endY; y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                    ctx.fillRect(width / 2 + camera.x + x * viewStep, height / 2 + camera.y + y * viewStep, viewStep, viewStep);
                }
            }

            if (selectedPiece) {
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 3;
                ctx.strokeRect(width / 2 + camera.x + selectedPiece.x * viewStep, height / 2 + camera.y + selectedPiece.y * viewStep, viewStep, viewStep);
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `${viewStep * 0.8}px serif`;
            board.forEach(p => {
                ctx.fillStyle = 'black';
                ctx.fillText(PIECES[p.color][p.type], width / 2 + camera.x + (p.x + 0.5) * viewStep, height / 2 + camera.y + (p.y + 0.5) * viewStep);
            });
            requestAnimationFrame(draw);
        }

        // Input logic kept the same...
        canvas.addEventListener('mousedown', (e) => { isDragging = false; lastMouse = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                isDragging = true;
                camera.x += e.clientX - lastMouse.x;
                camera.y += e.clientY - lastMouse.y;
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });
        canvas.addEventListener('mouseup', (e) => { if (!isDragging) handleCellClick(screenToWorld(e.clientX, e.clientY)); });
        canvas.addEventListener('wheel', (e) => {
            camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
            camera.zoom = Math.max(0.1, Math.min(camera.zoom, 5));
        });

        function screenToWorld(pos) {
            return {
                x: Math.floor((pos.x - width / 2 - camera.x) / (cellSize * camera.zoom)),
                y: Math.floor((pos.y - height / 2 - camera.y) / (cellSize * camera.zoom))
            };
        }

        function handleCellClick(worldPos) {
            const x = worldPos.x; const y = worldPos.y;
            const pieceAtPos = board.find(p => p.x === x && p.y === y);
            if (selectedPiece) {
                if (pieceAtPos && pieceAtPos.color !== selectedPiece.color) {
                    board = board.filter(p => p !== pieceAtPos);
                    movePiece(x, y);
                } else if (!pieceAtPos) {
                    movePiece(x, y);
                } else {
                    selectedPiece = pieceAtPos.color === turn ? pieceAtPos : null;
                }
            } else if (pieceAtPos && pieceAtPos.color === turn) {
                selectedPiece = pieceAtPos;
            }
        }

        function movePiece(x, y) {
            selectedPiece.x = x;
            selectedPiece.y = y;
            selectedPiece = null;
            turn = turn === 'white' ? 'black' : 'white';
            turnDisplay.innerText = `Turn: ${turn.charAt(0).toUpperCase() + turn.slice(1)}`;
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                resize();
                initBoard();
                draw();
            }, 100);
        });
    </script>
</body>
</html>
