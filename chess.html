<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Chess 2 - Browser Test</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            /* NEW: Prevents mobile "pull-to-refresh" and accidental zooming */
            touch-action: none !important;
            user-select: none;
            -webkit-user-select: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 9px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            min-width: 180px;
        }

        #status {
            font-size: 0.85em;
            color: #00ff00;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .controls {
            font-size: 0.75em;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        #lobby-list {
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .lobby-item {
            display: block;
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            text-align: left;
        }

            .lobby-item:hover {
                background: #218838;
            }

        .lobby-label {
            font-size: 0.7em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
        }

        .card {
            background: #2c3e50;
            border: 2px solid gold;
            border-radius: 12px;
            padding: 20px;
            width: 200px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

            .card:hover {
                transform: scale(1.05);
                background: #34495e;
            }

            .card h3 {
                color: #f1c40f;
                margin-top: 0;
            }

            .card p {
                font-size: 0.9em;
                color: #ecf0f1;
            }

            .card small {
                color: #95a5a6;
                font-weight: bold;
            }

    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom</div>
        <div id="status">Status: Initializing...</div>

        <div id="lobby-list">
            <span class="lobby-label">Available Games:</span>
            <div id="rooms-container"></div>
        </div>
    </div>
    <div id="card-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:gold; margin-bottom:20px;">Choose a Power-up</h1>
        <div id="card-container" style="display:flex; gap:20px;"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCkwCHcME83CIh_D7RbO9kYD0sBPYCcl6Y",
            authDomain: "chess-2-2a1c9.firebaseapp.com",
            projectId: "chess-2-2a1c9",
            storageBucket: "chess-2-2a1c9.firebasestorage.app",
            messagingSenderId: "1048494437159",
            appId: "1:1048494437159:web:f471c57a71d361c982ef02",
            measurementId: "G-XB4DL015VR",
            databaseURL: "https://chess-2-2a1c9-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch (e) { console.error("Firebase load error", e); }

        // 2. GLOBALS
        let myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
        let currentRoomId = myRoomId;
        let roomRef = null;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');
        const turnDisplay = document.getElementById('turn');
        const roomsContainer = document.getElementById('rooms-container');

        let width, height, cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false, lastMouse = { x: 0, y: 0 }, touchStartPos = { x: 0, y: 0 };
        let initialPinchDist = null, lastZoom = 1;
        let gameOver = false, winner = null;

        let moveCount = 0;
        let isChoosingCard = false;
        let availableCards = [];

        let myColor = 'white';
        let selectedPiece = null, turn = 'white', board = [];

        const PIECES = {
            white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        // 3. GAME RULES
        function isValidMove(piece, targetX, targetY) {
            if (!piece) return false;
            const dx = targetX - piece.x, dy = targetY - piece.y;
            const absDx = Math.abs(dx), absDy = Math.abs(dy);

            const isPathClear = (stepX, stepY) => {
                let curX = piece.x + stepX, curY = piece.y + stepY;
                while (curX !== targetX || curY !== targetY) {
                    if (board.find(p => p.x === curX && p.y === curY)) return false;
                    curX += stepX; curY += stepY;
                }
                return true;
            };

            switch (piece.type) {
                case 'p':
                    const dir = piece.color === 'white' ? -1 : 1;
                    const pieceAtTarget = board.find(p => p.x === targetX && p.y === targetY);
                    if (dx === 0 && !pieceAtTarget) {
                        if (dy === dir) return true;
                        if (piece.y === (piece.color === 'white' ? 6 : 1) && dy === 2 * dir && !board.find(p => p.x === piece.x && p.y === piece.y + dir)) return true;
                    }
                    return (absDx === 1 && dy === dir && pieceAtTarget && pieceAtTarget.color !== piece.color);
                case 'r': return (dx === 0 || dy === 0) && isPathClear(dx === 0 ? 0 : dx / absDx, dy === 0 ? 0 : dy / absDy);
                case 'n': return (absDx === 1 && absDy === 2) || (absDx === 2 && absDy === 1);
                case 'b': return (absDx === absDy) && isPathClear(dx / absDx, dy / absDy);
                case 'q': return (dx === 0 || dy === 0 || absDx === absDy) && isPathClear(dx === 0 ? 0 : dx / absDx, dy === 0 ? 0 : dy / absDy);
                case 'k': return absDx <= 1 && absDy <= 1;
            }
            return false;
        }

        function checkWinCondition() {
            const whiteKings = board.filter(p => p.color === 'white' && p.type === 'k').length;
            const blackKings = board.filter(p => p.color === 'black' && p.type === 'k').length;
            if (whiteKings === 0 || blackKings === 0) {
                gameOver = true;
                winner = whiteKings > 0 ? 'White' : 'Black';
                if (roomRef) roomRef.update({ status: 'GAMEOVER', winner: winner });
            }
        }

        function resetGame() {
            gameOver = false; winner = null; moveCount = 0; initBoard();
            if (roomRef) roomRef.update({ board, turn: 'white', status: 'PLAYING', winner: null, moveCount: 0 });
        }

        // 4. CORE LOGIC
        function initBoard() {
            board = [];
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board.push({ x: i, y: 7, type: layout[i], color: 'white' });
                board.push({ x: i, y: 6, type: 'p', color: 'white' });
                board.push({ x: i, y: 0, type: layout[i], color: 'black' });
                board.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
        }

        function screenToWorld(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: Math.floor((clientX - rect.left - width / 2 - camera.x) / (cellSize * camera.zoom)),
                y: Math.floor((clientY - rect.top - height / 2 - camera.y) / (cellSize * camera.zoom))
            };
        }

        function handleGameClick(worldPos) {
            if (gameOver) { resetGame(); return; }
            if (turn !== myColor || isChoosingCard) return;

            const pieceAtPos = board.find(p => p.x === worldPos.x && p.y === worldPos.y);

            if (selectedPiece) {
                if (pieceAtPos && pieceAtPos.color === myColor) {
                    selectedPiece = pieceAtPos; return;
                }
                if (isValidMove(selectedPiece, worldPos.x, worldPos.y)) {
                    board = board.filter(p => !(p.x === worldPos.x && p.y === worldPos.y));
                    const p = board.find(p => p.x === selectedPiece.x && p.y === selectedPiece.y);
                    if (p) { p.x = worldPos.x; p.y = worldPos.y; }

                    checkWinCondition();
                    selectedPiece = null;
                    turn = (turn === 'white' ? 'black' : 'white');
                    moveCount++;

                    if (roomRef) {
                        roomRef.update({ board, turn, moveCount: moveCount });
                    }
                    updateTurnDisplay();
                } else {
                    selectedPiece = null;
                }
            } else if (pieceAtPos && pieceAtPos.color === myColor) {
                selectedPiece = pieceAtPos;
            }
        }

        function spawnExtraPieces(type, color, count, direction = "outer") {
            const pDir = (color === 'white') ? -1 : 1;
            const spawnY = (color === 'white') ? 7 : 0;

            for (let i = 0; i < count; i++) {
                let targetX, targetY;

                if (direction === "forward") {
                    const myPawns = board.filter(p => p.color === color && p.type === 'p');
                    if (myPawns.length > 0) {
                        const p = myPawns[i % myPawns.length];
                        targetX = p.x;
                        targetY = p.y + pDir;
                    } else {
                        targetX = i; targetY = spawnY + pDir;
                    }
                } else {
                    // CIRCUIT BREAKER: If it can't find a spot in 20 tries, it stops.
                    let attemptX = (i % 2 === 0) ? -1 - Math.floor(i / 2) : 8 + Math.floor(i / 2);
                    let safety = 0;
                    while (board.find(p => p.x === attemptX && p.y === spawnY) && safety < 20) {
                        if (i % 2 === 0) attemptX--; else attemptX++;
                        safety++;
                    }
                    targetX = attemptX;
                    targetY = spawnY;
                }

                // Final check to prevent stacking pieces
                if (!board.find(p => p.x === targetX && p.y === targetY)) {
                    board.push({ x: targetX, y: targetY, type: type, color: color });
                }
            }
        }

        // 5. NETWORKING
        function initMultiplayer() {
            if (!db) { statusDisplay.innerText = "Offline Mode"; return; }
            initAsHost(myRoomId);
            db.ref('rooms').on('value', (snap) => {
                roomsContainer.innerHTML = "";
                let count = 0;
                snap.forEach((child) => {
                    const data = child.val();
                    if (child.key !== currentRoomId && data && !data.guestJoined) {
                        count++;
                        const btn = document.createElement('button');
                        btn.className = 'lobby-item';
                        btn.innerHTML = `⚡ Join Player ${child.key}`;
                        btn.onclick = () => joinOtherRoom(child.key);
                        roomsContainer.appendChild(btn);
                    }
                });
                if (count === 0) roomsContainer.innerHTML = "<div style='color:#666; font-size:0.8em;'>Searching...</div>";
            });
        }

        function initAsHost(id) {
            currentRoomId = id; roomRef = db.ref('rooms/' + id);
            myColor = 'white';
            roomRef.set({ board, turn: 'white', hostColor: 'white', guestColor: 'black', guestJoined: false, moveCount: 0 });
            roomRef.onDisconnect().remove();
            roomRef.on('value', syncState);
        }

        function joinOtherRoom(targetId) {
            if (roomRef) roomRef.off();
            db.ref('rooms/' + myRoomId).remove();
            currentRoomId = targetId; roomRef = db.ref('rooms/' + targetId);
            roomRef.once('value').then(snap => {
                const d = snap.val();
                if (d) {
                    myColor = d.hostColor === 'white' ? 'black' : 'white';
                    roomRef.update({ guestJoined: true, guestColor: myColor });
                    roomRef.on('value', syncState);
                }
            });
        }

        function syncState(snap) {
            const d = snap.val();
            if (!d) return;

            board = d.board || [];
            turn = d.turn || 'white';
            gameOver = d.status === 'GAMEOVER';
            winner = d.winner || null;

            // Check if the move count actually changed in Firebase
            if (d.moveCount !== undefined && d.moveCount !== moveCount) {
                moveCount = d.moveCount;

                // Trigger cards every 6 moves
                if (moveCount > 0 && moveCount % 6 === 0) {
                    // Only the player whose turn it is sees the cards
                    if (turn === myColor && !isChoosingCard) {
                        triggerCardSelection();
                    }
                }
            }

            updateTurnDisplay();
            statusDisplay.innerText = `Online | You: ${myColor.toUpperCase()}`;
        }

        function updateTurnDisplay() {
            const isMe = (turn === myColor);
            turnDisplay.innerText = `Turn: ${turn.toUpperCase()} ${isMe ? "(YOU)" : ""}`;
            turnDisplay.style.color = isMe ? "#00ff00" : "#fff";
        }

        // 6. POWERUPS
        async function triggerCardSelection() {
            if (isChoosingCard) return;
            isChoosingCard = true;

            try {
                const snapshot = await db.ref('powerups').once('value');
                const allPowerups = [];
                snapshot.forEach(child => {
                    allPowerups.push({ id: child.key, ...child.val() });
                });

                if (allPowerups.length > 0) {
                    // Ensure we don't try to pick more cards than exist
                    const countToPick = Math.min(2, allPowerups.length);
                    availableCards = getWeightedRandomCards(allPowerups, countToPick);
                    showCardUI();
                } else {
                    isChoosingCard = false;
                    console.warn("No powerups found in Firebase 'powerups' node.");
                }
            } catch (e) {
                isChoosingCard = false;
                console.error("Powerup fetch failed", e);
            }
        }

        function showCardUI() {
            const overlay = document.getElementById('card-overlay');
            const container = document.getElementById('card-container');
            overlay.style.display = 'flex';
            container.innerHTML = '';

            availableCards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.innerHTML = `
            <h3>${card.name}</h3>
            <p>${card.desc}</p>
            <small>${card.rarity.toUpperCase()}</small>
        `;
                cardEl.onclick = () => applyPowerup(card);
                container.appendChild(cardEl);
            });
        }

        function applyPowerup(card) {
            executePowerupLogic(card.id);
            isChoosingCard = false;
            document.getElementById('card-overlay').style.display = 'none';
            statusDisplay.innerText = `Activated: ${card.name}!`;
        }

        function getWeightedRandomCards(allCards, count) {
            let selected = [];
            let tempPool = [...allCards];
            for (let i = 0; i < count; i++) {
                let totalWeight = tempPool.reduce((sum, card) => sum + (card.weight || 10), 0);
                let random = Math.random() * totalWeight;
                let cursor = 0;
                for (let j = 0; j < tempPool.length; j++) {
                    cursor += (tempPool[j].weight || 10);
                    if (random <= cursor) {
                        selected.push(tempPool[j]);
                        tempPool.splice(j, 1);
                        break;
                    }
                }
            }
            return selected;
        }

        function executePowerupLogic(cardId) {
            const player = myColor;
            switch (cardId) {
                case 'p1': spawnExtraPieces('r', player, 2, "outer"); break;
                case 'p2': spawnExtraPieces('k', player, 1, "outer"); break;
                case 'p3': spawnExtraPieces('p', player, 1, "forward"); break;
            }
            if (roomRef) roomRef.update({ board: board });
        }

        // 7. DRAWING
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // SAFETY: If zoom or cellSize somehow hit 0, this prevents an infinite loop
            const vStep = Math.max(1, cellSize * (camera.zoom || 1));

            // This math ensures the grid coordinates stay relative to your screen center
            const centerX = width / 2 + (camera.x || 0);
            const centerY = height / 2 + (camera.y || 0);

            const minX = Math.floor(-centerX / vStep);
            const maxX = Math.ceil((width - centerX) / vStep);
            const minY = Math.floor(-centerY / vStep);
            const maxY = Math.ceil((height - centerY) / vStep);

            // CIRCUIT BREAKER: If the loop tries to draw more than 5,000 squares, 
            // it skips the grid for 1 frame instead of crashing your browser.
            const totalSquares = (maxX - minX) * (maxY - minY);
            if (totalSquares > 0 && totalSquares < 5000) {
                for (let x = minX; x <= maxX; x++) {
                    for (let y = minY; y <= maxY; y++) {
                        ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                        ctx.fillRect(centerX + x * vStep, centerY + y * vStep, vStep, vStep);

                        if (selectedPiece && isValidMove(selectedPiece, x, y)) {
                            ctx.fillStyle = 'rgba(0, 255, 0, 0.2)';
                            ctx.fillRect(centerX + x * vStep + 2, centerY + y * vStep + 2, vStep - 4, vStep - 4);
                        }
                    }
                }
            }

            if (selectedPiece) {
                ctx.strokeStyle = 'red';
                ctx.lineWidth = 3;
                ctx.strokeRect(centerX + selectedPiece.x * vStep, centerY + selectedPiece.y * vStep, vStep, vStep);
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `${vStep * 0.7}px serif`;

            board.forEach(p => {
                ctx.fillStyle = 'black';
                ctx.fillText(PIECES[p.color][p.type], centerX + (p.x + 0.5) * vStep, centerY + (p.y + 0.5) * vStep);
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px sans-serif';
                ctx.fillText(`GAME OVER`, width / 2, height / 2 - 40);
                ctx.font = '30px sans-serif';
                ctx.fillText(`${winner} Wins!`, width / 2, height / 2 + 10);
                ctx.font = '16px sans-serif';
                ctx.fillText(`Tap anywhere to restart`, width / 2, height / 2 + 60);
            }
            requestAnimationFrame(draw);
        }

        // 8. INPUTS
        canvas.addEventListener('mousedown', e => { isDragging = false; lastMouse = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', e => { if (e.buttons === 1) { isDragging = true; camera.x += e.clientX - lastMouse.x; camera.y += e.clientY - lastMouse.y; lastMouse = { x: e.clientX, y: e.clientY }; } });
        canvas.addEventListener('mouseup', e => { if (!isDragging) handleGameClick(screenToWorld(e.clientX, e.clientY)); });

        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 1) { isDragging = false; touchStartPos = lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
            else if (e.touches.length === 2) { isDragging = true; initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); lastZoom = camera.zoom; }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && !initialPinchDist) {
                camera.x += e.touches[0].clientX - lastMouse.x; camera.y += e.touches[0].clientY - lastMouse.y;
                if (Math.hypot(e.touches[0].clientX - touchStartPos.x, e.touches[0].clientY - touchStartPos.y) > 10) isDragging = true;
                lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                camera.zoom = Math.max(0.15, Math.min(lastZoom * (d / initialPinchDist), 4));
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => { if (e.touches.length === 0 && !isDragging) handleGameClick(screenToWorld(touchStartPos.x, touchStartPos.y)); initialPinchDist = null; });
        window.addEventListener('resize', resize);
        canvas.addEventListener('wheel', e => camera.zoom = Math.max(0.1, Math.min(camera.zoom * (e.deltaY > 0 ? 0.9 : 1.1), 5)));

        resize(); initBoard(); draw(); initMultiplayer();
    </script>
</body>
</html>
