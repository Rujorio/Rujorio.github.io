<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Chess 2 - Browser Test</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            /* NEW: Prevents mobile "pull-to-refresh" and accidental zooming */
            touch-action: none !important;
            user-select: none;
            -webkit-user-select: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 9px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            min-width: 180px;
        }

        #status {
            font-size: 0.85em;
            color: #00ff00;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .controls {
            font-size: 0.75em;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        #lobby-list {
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .lobby-item {
            display: block;
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            text-align: left;
        }

            .lobby-item:hover {
                background: #218838;
            }

        .lobby-label {
            font-size: 0.7em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="turn">Turn: White</div>
        <div class="controls">Drag to Pan | Scroll to Zoom</div>
        <div id="status">Status: Initializing...</div>

        <div id="lobby-list">
            <span class="lobby-label">Available Games:</span>
            <div id="rooms-container"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // 1. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCkwCHcME83CIh_D7RbO9kYD0sBPYCcl6Y",
            authDomain: "chess-2-2a1c9.firebaseapp.com",
            projectId: "chess-2-2a1c9",
            storageBucket: "chess-2-2a1c9.firebasestorage.app",
            messagingSenderId: "1048494437159",
            appId: "1:1048494437159:web:f471c57a71d361c982ef02",
            measurementId: "G-XB4DL015VR",
            databaseURL: "https://chess-2-2a1c9-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        // Initialize Firebase safely
        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch (e) { console.error("Firebase load error"); }

        // 2. GLOBALS
        let myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
        let currentRoomId = myRoomId;
        let roomRef = null;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');
        const turnDisplay = document.getElementById('turn');
        const roomsContainer = document.getElementById('rooms-container');

        let width, height, cellSize = 60;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false, lastMouse = { x: 0, y: 0 }, touchStartPos = { x: 0, y: 0 };
        let initialPinchDist = null, lastZoom = 1;

        // NEW: Role logic
        let myColor = 'white'; // Default to white so it loads immediately
        let selectedPiece = null, turn = 'white', board = [];

        const PIECES = {
            white: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            black: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        // 3. GAME RULES & VALIDATION
        function isValidMove(piece, targetX, targetY) {
            const dx = targetX - piece.x;
            const dy = targetY - piece.y;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            const isPathClear = (stepX, stepY) => {
                if (!isFinite(stepX) || !isFinite(stepY) || (stepX === 0 && stepY === 0)) return false;
                let curX = piece.x + stepX, curY = piece.y + stepY, s = 0;
                while ((curX !== targetX || curY !== targetY) && s < 100) {
                    if (board.find(p => p.x === curX && p.y === curY)) return false;
                    curX += stepX; curY += stepY; s++;
                }
                return true;
            };

            switch (piece.type) {
                case 'p':
                    const dir = piece.color === 'white' ? -1 : 1;
                    const pieceAtTarget = board.find(p => p.x === targetX && p.y === targetY);
                    if (dx === 0 && !pieceAtTarget) {
                        if (dy === dir) return true;
                        if (piece.y === (piece.color === 'white' ? 6 : 1) && dy === 2 * dir && !board.find(p => p.x === piece.x && p.y === piece.y + dir)) return true;
                    }
                    return (absDx === 1 && dy === dir && pieceAtTarget && pieceAtTarget.color !== piece.color);
                case 'r': return (dx === 0 || dy === 0) && isPathClear(dx === 0 ? 0 : dx / absDx, dy === 0 ? 0 : dy / absDy);
                case 'n': return (absDx === 1 && absDy === 2) || (absDx === 2 && absDy === 1);
                case 'b': return (absDx === absDy) && isPathClear(dx / absDx, dy / absDy);
                case 'q': return (dx === 0 || dy === 0 || absDx === absDy) && isPathClear(dx === 0 ? 0 : dx / absDx, dy === 0 ? 0 : dy / absDy);
                case 'k': return absDx <= 1 && absDy <= 1;
            }
            return false;
        }

        // 4. CORE LOGIC
        function initBoard() {
            board = [];
            const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
            for (let i = 0; i < 8; i++) {
                board.push({ x: i, y: 7, type: layout[i], color: 'white' });
                board.push({ x: i, y: 6, type: 'p', color: 'white' });
                board.push({ x: i, y: 0, type: layout[i], color: 'black' });
                board.push({ x: i, y: 1, type: 'p', color: 'black' });
            }
        }

        function screenToWorld(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left, y = clientY - rect.top;
            return {
                x: Math.floor((x - width / 2 - camera.x) / (cellSize * camera.zoom)),
                y: Math.floor((y - height / 2 - camera.y) / (cellSize * camera.zoom))
            };
        }

        function handleGameClick(worldPos) {
            if (turn !== myColor) return;
            const pieceAtPos = board.find(p => p.x === worldPos.x && p.y === worldPos.y);

            if (selectedPiece) {
                if (pieceAtPos && pieceAtPos.color === myColor) {
                    selectedPiece = pieceAtPos; return;
                }
                if (isValidMove(selectedPiece, worldPos.x, worldPos.y)) {
                    board = board.filter(p => !(p.x === worldPos.x && p.y === worldPos.y));
                    const p = board.find(p => p.x === selectedPiece.x && p.y === selectedPiece.y);
                    if (p) { p.x = worldPos.x; p.y = worldPos.y; }
                    selectedPiece = null; turn = (turn === 'white' ? 'black' : 'white');
                    if (roomRef) roomRef.update({ board, turn });
                    updateTurnDisplay();
                } else { selectedPiece = null; }
            } else if (pieceAtPos && pieceAtPos.color === turn) {
                selectedPiece = pieceAtPos;
            }
        }

        // 5. NETWORKING

        function initMultiplayer() {
            if (!db) {
                statusDisplay.innerText = "Offline: Firebase Blocked";
                return;
            }

            // 1. Create your own room so others can see YOU
            initAsHost(myRoomId);

            // 2. Listen for OTHER rooms so you can see THEM
            db.ref('rooms').on('value', (snapshot) => {
                roomsContainer.innerHTML = ""; // Clear list
                let availableRooms = 0;

                snapshot.forEach((child) => {
                    const data = child.val();

                    // CRITICAL: Only show rooms that:
                    // - Are NOT your own room
                    // - Do NOT have a guest yet (not full)
                    if (child.key !== currentRoomId && data && !data.guestJoined) {
                        availableRooms++;
                        const btn = document.createElement('button');
                        btn.className = 'lobby-item';
                        btn.innerHTML = `<span>⚡ Join ${data.hostName || 'Player'}</span>`;

                        btn.onclick = () => {
                            console.log("Attempting to join:", child.key);
                            joinOtherRoom(child.key);
                        };

                        roomsContainer.appendChild(btn);
                    }
                });

                if (availableRooms === 0) {
                    roomsContainer.innerHTML = "<div style='color:#666; font-size:0.8em;'>Waiting for players...</div>";
                }
            });
        }

        function initAsHost(id) {
            if (!db) return;
            currentRoomId = id; roomRef = db.ref('rooms/' + id);
            myColor = 'white';
            roomRef.set({ board, turn: 'white', hostColor: 'white', guestColor: 'black', guestJoined: false });
            roomRef.onDisconnect().remove();
            roomRef.on('value', syncState);
        }

        function joinOtherRoom(targetId) {
            // Stop hosting your own room to save resources
            if (roomRef) roomRef.off();
            db.ref('rooms/' + myRoomId).remove();

            currentRoomId = targetId;
            roomRef = db.ref('rooms/' + targetId);

            roomRef.once('value').then(snap => {
                const d = snap.val();
                if (d) {
                    // Assign color based on what the host ISN'T
                    myColor = (d.hostColor === 'white') ? 'black' : 'white';

                    roomRef.update({
                        guestJoined: true,
                        guestColor: myColor
                    });

                    roomRef.on('value', syncState);
                    statusDisplay.innerText = `Connected! Role: ${myColor}`;
                }
            });
        }

        function syncState(snap) {
            const d = snap.val();
            if (!d) return;
            board = d.board || []; turn = d.turn || 'white';
            myColor = (currentRoomId === myRoomId) ? d.hostColor : d.guestColor;
            updateTurnDisplay();
            statusDisplay.innerText = `Status: Online | You: ${myColor}`;
        }

        function updateTurnDisplay() {
            const isMe = (turn === myColor);
            turnDisplay.innerText = `Turn: ${turn.toUpperCase()} ${isMe ? "(YOU)" : ""}`;
            turnDisplay.style.color = isMe ? "#00ff00" : "#fff";
        }

        // 6. DRAWING
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const vStep = cellSize * camera.zoom;
            const minX = Math.floor((-width / 2 - camera.x) / vStep), maxX = Math.ceil((width / 2 - camera.x) / vStep);
            const minY = Math.floor((-height / 2 - camera.y) / vStep), maxY = Math.ceil((height / 2 - camera.y) / vStep);

            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#eee' : '#999';
                    ctx.fillRect(width / 2 + camera.x + x * vStep, height / 2 + camera.y + y * vStep, vStep, vStep);
                    if (selectedPiece && isValidMove(selectedPiece, x, y)) {
                        ctx.fillStyle = 'rgba(0, 255, 0, 0.2)';
                        ctx.fillRect(width / 2 + camera.x + x * vStep + 2, height / 2 + camera.y + y * vStep + 2, vStep - 4, vStep - 4);
                    }
                }
            }
            if (selectedPiece) {
                ctx.strokeStyle = 'red'; ctx.lineWidth = 3;
                ctx.strokeRect(width / 2 + camera.x + selectedPiece.x * vStep, height / 2 + camera.y + selectedPiece.y * vStep, vStep, vStep);
            }
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${vStep * 0.7}px serif`;
            board.forEach(p => {
                ctx.fillStyle = 'black';
                ctx.fillText(PIECES[p.color][p.type], width / 2 + camera.x + (p.x + 0.5) * vStep, height / 2 + camera.y + (p.y + 0.5) * vStep);
            });
            requestAnimationFrame(draw);
        }

        // 7. INPUTS
        canvas.addEventListener('mousedown', e => { isDragging = false; lastMouse = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('mousemove', e => { if (e.buttons === 1) { isDragging = true; camera.x += e.clientX - lastMouse.x; camera.y += e.clientY - lastMouse.y; lastMouse = { x: e.clientX, y: e.clientY }; } });
        canvas.addEventListener('mouseup', e => { if (!isDragging) handleGameClick(screenToWorld(e.clientX, e.clientY)); });

        canvas.addEventListener('touchstart', e => {
            if (e.cancelable) e.preventDefault();
            if (e.touches.length === 1) { isDragging = false; touchStartPos = lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
            else if (e.touches.length === 2) { isDragging = true; initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); lastZoom = camera.zoom; }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            if (e.cancelable) e.preventDefault();
            if (e.touches.length === 1 && !initialPinchDist) {
                camera.x += e.touches[0].clientX - lastMouse.x; camera.y += e.touches[0].clientY - lastMouse.y;
                if (Math.hypot(e.touches[0].clientX - touchStartPos.x, e.touches[0].clientY - touchStartPos.y) > 10) isDragging = true;
                lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                camera.zoom = Math.max(0.15, Math.min(lastZoom * (d / initialPinchDist), 4));
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => { if (e.touches.length === 0 && !isDragging) handleGameClick(screenToWorld(touchStartPos.x, touchStartPos.y)); }, { passive: false });
        window.addEventListener('resize', resize);
        canvas.addEventListener('wheel', e => camera.zoom = Math.max(0.1, Math.min(camera.zoom * (e.deltaY > 0 ? 0.9 : 1.1), 5)));

        // START
        resize(); initBoard(); draw(); initMultiplayer();
        if (db) initAsHost(myRoomId); else statusDisplay.innerText = "Offline Mode";
    </script>
</body>
</html>
